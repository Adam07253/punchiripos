appId: com.punchiri.pos
productName: Punchiri POS
asar: false
directories:
  output: dist
files:
  - main.js
  - server.js
  - database.js
  - database-import.js
  - realtime-sync.js
  - backup-manager.js
  - frontend/**/*
  - node_modules/**/*
  - package.json
  - .env
  - settings.json
  - "!backups/**/*"
  - "!dist/**/*"
  - "!.kiro/**/*"
  - "!.vscode/**/*"
  - "!*.db"
  - "!*.db-shm"
  - "!*.db-wal"
win:
  target: nsis
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "${productName} Setup.${ext}"
publish:
  provider: github
  owner: Adam07253
  repo: punchiri-pos
