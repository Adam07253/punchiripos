<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Punchiri Stores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e88e5;
            --primary-dark: #1565c0;
            --danger: #ef4444;
            --success: #10b981;
            --blue-bg: #1e88e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--blue-bg);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Left Side - Logo */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, rgba(30, 136, 229, 0.9) 0%, rgba(21, 101, 192, 0.9) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .left-side::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,101.3C1248,85,1344,75,1392,69.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat;
            opacity: 0.3;
            animation: wave 20s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .logo-container {
            text-align: center;
            z-index: 1;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .logo-icon svg {
            width: 70px;
            height: 70px;
            fill: white;
        }

        .logo-text h1 {
            font-size: 36px;
            color: white;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
        }

        /* Right Side - Form */
        .right-side {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .user-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .user-icon svg {
            width: 45px;
            height: 45px;
            fill: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }

        .form-input {
            width: 100%;
            padding: 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .form-input.error {
            border-color: var(--danger);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }

        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: var(--success);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 136, 229, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .links {
            margin-top: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .link {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }

        .link:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-title h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
        }

        .form-title p {
            font-size: 14px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }

            .left-side {
                min-height: 200px;
            }

            .logo-text h1 {
                font-size: 28px;
            }

            .right-side {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side - Logo -->
        <div class="left-side">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>PUNCHIRI STORES</h1>
                    <p>Management System</p>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="right-side">
            <div class="login-container">
                <!-- Login Form -->
                <div id="loginForm">
                    <div class="user-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <div class="input-wrapper">
                                <span class="input-icon">👤</span>
                                <input type="text" id="loginUsername" class="form-input" placeholder="Username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <span class="input-icon">🔒</span>
                                <input type="password" id="loginPassword" class="form-input" placeholder="Password" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">Show</button>
                            </div>
                        </div>

                        <div class="error-message" id="loginError"></div>

                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>

                    <div class="links">
                        <a class="link" onclick="showForgotPassword()">Forgot Password?</a>
                        <a class="link" onclick="showChangeUsername()">Change Username</a>
                    </div>
                </div>

                <!-- Forgot Password Form -->
                <div id="forgotPasswordForm" class="hidden">
                    <a class="back-link" onclick="showLogin()">← Back to Login</a>
                    
                    <div class="form-title">
                        <h2>Reset Password</h2>
                        <p>Enter admin key to reset password</p>
                    </div>

                    <div id="adminKeyStep">
                        <form onsubmit="verifyAdminKey(event)">
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <span class="input-icon">🔑</span>
                                    <input type="text" id="adminKey" class="form-input" placeholder="Enter admin key" required>
                                </div>
                            </div>

                            <div class="error-message" id="adminKeyError"></div>

                            <button type="submit" class="btn btn-primary">Verify</button>
                        </form>
                    </div>

                    <div id="resetPasswordStep" class="hidden">
                        <form onsubmit="handleResetPassword(event)">
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <span class="input-icon">🔒</span>
                                    <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">Show</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <div class="input-wrapper">
                                    <span class="input-icon">🔒</span>
                                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">Show</button>
                                </div>
                            </div>

                            <div class="error-message" id="resetPasswordError"></div>
                            <div class="success-message" id="resetPasswordSuccess"></div>

                            <button type="submit" class="btn btn-primary">Save Password</button>
                        </form>
                    </div>
                </div>

                <!-- Change Username Form -->
                <div id="changeUsernameForm" class="hidden">
                    <a class="back-link" onclick="showLogin()">← Back to Login</a>
                    
                    <div class="form-title">
                        <h2>Change Username</h2>
                        <p>Update your admin username</p>
                    </div>

                    <form onsubmit="handleChangeUsername(event)">
                        <div class="form-group">
                            <div class="input-wrapper">
                                <span class="input-icon">👤</span>
                                <input type="text" id="newUsername" class="form-input" placeholder="Enter new username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <span class="input-icon">🔒</span>
                                <input type="password" id="currentPassword" class="form-input" placeholder="Enter current password" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('currentPassword')">Show</button>
                            </div>
                        </div>

                        <div class="error-message" id="changeUsernameError"></div>
                        <div class="success-message" id="changeUsernameSuccess"></div>

                        <button type="submit" class="btn btn-primary">Save Username</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = 'Hide';
            } else {
                input.type = 'password';
                button.textContent = 'Show';
            }
        }

        // Show/Hide forms
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('forgotPasswordForm').classList.add('hidden');
            document.getElementById('changeUsernameForm').classList.add('hidden');
            clearMessages();
        }

        function showForgotPassword() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotPasswordForm').classList.remove('hidden');
            document.getElementById('changeUsernameForm').classList.add('hidden');
            document.getElementById('adminKeyStep').classList.remove('hidden');
            document.getElementById('resetPasswordStep').classList.add('hidden');
            clearMessages();
        }

        function showChangeUsername() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotPasswordForm').classList.add('hidden');
            document.getElementById('changeUsernameForm').classList.remove('hidden');
            clearMessages();
        }

        function clearMessages() {
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
        }

        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('show');
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();
            clearMessages();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('loginError', 'Please fill in all fields');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store session (cleared when browser/app closes)
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminUsername', username);
                    
                    // Redirect to dashboard
                    window.location.href = '/dashboard.html';
                } else {
                    showError('loginError', data.error || 'Invalid username or password');
                }
            } catch (error) {
                showError('loginError', 'Connection error. Please try again.');
            }
        }

        // Verify Admin Key
        async function verifyAdminKey(event) {
            event.preventDefault();
            clearMessages();

            const adminKey = document.getElementById('adminKey').value.trim();

            if (adminKey === 'codePass') {
                document.getElementById('adminKeyStep').classList.add('hidden');
                document.getElementById('resetPasswordStep').classList.remove('hidden');
            } else {
                showError('adminKeyError', 'Invalid admin key');
            }
        }

        // Handle Reset Password
        async function handleResetPassword(event) {
            event.preventDefault();
            clearMessages();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                showError('resetPasswordError', 'Please fill in all fields');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('resetPasswordError', 'Passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                showError('resetPasswordError', 'Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('resetPasswordSuccess', 'Password reset successful! Redirecting...');
                    setTimeout(() => showLogin(), 2000);
                } else {
                    showError('resetPasswordError', data.error || 'Failed to reset password');
                }
            } catch (error) {
                showError('resetPasswordError', 'Connection error. Please try again.');
            }
        }

        // Handle Change Username
        async function handleChangeUsername(event) {
            event.preventDefault();
            clearMessages();

            const newUsername = document.getElementById('newUsername').value.trim();
            const currentPassword = document.getElementById('currentPassword').value;

            if (!newUsername || !currentPassword) {
                showError('changeUsernameError', 'Please fill in all fields');
                return;
            }

            if (newUsername.length < 3) {
                showError('changeUsernameError', 'Username must be at least 3 characters');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/change-username`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newUsername, currentPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('changeUsernameSuccess', 'Username changed successfully! Redirecting...');
                    setTimeout(() => showLogin(), 2000);
                } else {
                    showError('changeUsernameError', data.error || 'Failed to change username');
                }
            } catch (error) {
                showError('changeUsernameError', 'Connection error. Please try again.');
            }
        }

        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
